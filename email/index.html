<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 330 Final Project - Athanase Muamba</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <div class="form-container">
        <div class="hero-section">
            <img src="images/hero.png" alt="Hero Project" class="hero-img">
        </div>

        <header>
            <h2>WDD 330 Final Project</h2>
            <p>Join our newsletter to stay updated on project progress.</p>
        </header>
        
        <form id="newsletter-form">
            <div class="input-group">
                <input 
                    type="email" 
                    id="newsletter-email" 
                    placeholder="Enter your professional email" 
                    required
                >
            </div>
            <button type="submit" id="subscribe-btn">Subscribe Now</button>
        </form>

        <div id="feedback-message"></div>

        <div id="quote-box">
            <p class="loading">Loading inspiration...</p>
        </div>

        <div class="social-icons">
            <img src="images/facebook.png" class="icon" alt="Facebook">
            <img src="images/instagram.png" class="icon" alt="Instagram">
            <img src="images/linkedin.png" class="icon" alt="LinkedIn">
        </div>
    </div>

    <script src="script/main.js"></script>
</body>
</html>
