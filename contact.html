<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sleep Outside</title>
    <link rel="stylesheet" href="styles/contact.css">
</head>
<body>
    <header class="divider">
        <div class="logo">
            <a href="index.html"><img src="images/logo.png" alt="Logo" width="80"></a>
        </div>
        <button id="hamburger-menu" aria-label="Open Menu">&#9776;</button>
        <nav class="main-nav" id="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <h1>Sleep Outside</h1>
    </header>

    <main class="divider">
        <section class="hero">
            <h1>Contact Us</h1>
            <p>Have questions? We'd love to hear from you.</p>
        </section>

        <form id="contact-form" class="contact-form">
            <label for="userName">Full Name:</label>
            <input type="text" id="userName" name="userName" required placeholder="Enter your name">

            <label for="userEmail">Email:</label>
            <input type="email" id="userEmail" name="userEmail" required placeholder="email@example.com">

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required placeholder="How can we help?"></textarea>

            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </main>

    <footer class="divider">
        <p>&copy; 2026 Sleep Outside - Kazadi A. Muamba</p>
    </footer>
    <script src="scripts/main.js"></script>
</body>
</html>
