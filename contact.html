<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sleep Outside</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/contact.css">
</head>
<body>
    <header class="divider">
        <div class="logo">
            <a href="index.html"><img src="images/logo.png" alt="Logo" width="80"></a>
        </div>
        <button id="hamburger-menu" aria-label="Open Menu">&#9776;</button>
        <nav id="nav-menu">
            <ul class="main-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <h1 class="site-title">Sleep Outside</h1>
    </header>

    <main class="divider">
        <section class="contact-card">
            <h2>Contact Us</h2>
            <p>Have questions? We'd love to hear from you.</p>
            
            <form action="#" method="post" class="form-layout">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="How can we help?"></textarea>

                <button type="submit" class="btn-primary">Send Message</button>
            </form>
        </section>
    </main>

    <footer class="divider">
        <p>&copy; 2026 Sleep Outside - Kazadi A. Muamba</p>
    </footer>

    <script src="scripts/main.js"></script>
</body>
</html>
